<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Season Tix — First-Time Setup</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-card">

      <div class="auth-header">
        <span class="logo">🎟️</span>
        <h1>Season Tix</h1>
        <p class="auth-subtitle">Admin setup — run this once</p>
      </div>

      <!-- SETUP FORM -->
      <div id="setupSection">
        <h2 style="font-size:18px;font-weight:700;margin-bottom:6px">Create admin account</h2>
        <p style="font-size:13px;color:var(--text-muted);margin-bottom:22px">
          This page creates the first (admin) account. Once complete it locks permanently.
        </p>

        <div id="setupError"   class="error-msg  hidden"></div>
        <div id="setupSuccess" class="success-msg hidden"></div>

        <button id="googleSetupBtn" class="btn btn-google btn-full">
          <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.013 17.64 11.705 17.64 9.2z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
            <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          Create Admin Account with Google
        </button>
        <div class="auth-divider">or</div>

        <div id="setupForm">
          <div class="form-group">
            <label for="setupName">Your Name</label>
            <input type="text" id="setupName" placeholder="Jeff West" autocomplete="name">
          </div>
          <div class="form-group">
            <label for="setupEmail">Email</label>
            <input type="email" id="setupEmail" placeholder="you@example.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label for="setupPassword">Password</label>
            <input type="password" id="setupPassword" placeholder="Min. 8 characters" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label for="setupConfirm">Confirm Password</label>
            <input type="password" id="setupConfirm" placeholder="••••••••" autocomplete="new-password">
          </div>
          <button id="setupBtn" class="btn btn-accent btn-full">Create Admin Account</button>
        </div>
      </div>

      <!-- ALREADY DONE -->
      <div id="doneSection" class="hidden" style="text-align:center;padding:12px 0">
        <div style="font-size:48px;margin-bottom:12px">✅</div>
        <p style="font-weight:700;font-size:16px;margin-bottom:8px">Setup already complete</p>
        <p style="font-size:14px;color:var(--text-muted);margin-bottom:24px">
          An admin account has already been created.
        </p>
        <a href="index.html" class="btn btn-primary">Go to Sign In</a>
      </div>

    </div>
  </div>

  <script type="module" src="js/setup.js"></script>
</body>
</html>
