<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Season Tix — Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===================== HEADER ===================== -->
  <header class="app-header">
    <a href="dashboard.html" class="header-brand">
      <img src="seahawks.png" alt="Seahawks" class="brand-icon" style="width:56px;height:56px;object-fit:contain">
      <span class="brand-name">Season Tix</span>
    </a>

    <nav class="header-nav">
      <a href="dashboard.html" class="nav-link active">My Tickets</a>
      <a href="admin.html" class="nav-link hidden" id="adminLink">Admin</a>
    </nav>

    <div class="header-user">
      <div class="user-avatar" id="userInitial"></div>
      <span class="user-name" id="userName"></span>
      <button id="logoutBtn" class="btn btn-ghost btn-sm" style="border-color:rgba(255,255,255,.3);color:rgba(255,255,255,.9)">
        Sign Out
      </button>
    </div>
  </header>

  <!-- ===================== MAIN ===================== -->
  <main class="app-main">

    <div class="dashboard-hero">
      <img src="friends.png" alt="Friends at the game" class="dashboard-hero-img">
      <div class="dashboard-hero-text">
        <h1>Season Tickets</h1>
        <p>Claim your seats and manage your reservations</p>
      </div>
    </div>

    <!-- Pending notice (shown for unapproved users) -->
    <div id="pendingNotice" class="hidden" style="text-align:center;padding:48px 24px">
      <div style="font-size:48px;margin-bottom:16px">⏳</div>
      <h2 style="font-size:20px;font-weight:700;margin-bottom:8px">Pending Approval</h2>
      <p style="color:var(--text-muted);font-size:14px;max-width:320px;margin:0 auto">
        Your account is waiting for admin approval. You'll be able to claim tickets once you're approved.
      </p>
    </div>

    <!-- Main content (hidden until approved) -->
    <div id="mainContent">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-panel="panelGames">Available Games</button>
      <button class="tab-btn"        data-panel="panelMyClaims">My Claims</button>
    </div>

    <!-- Available Games -->
    <div id="panelGames" class="tab-panel active">
      <div id="eventsContainer">
        <div class="loading"><div class="spinner"></div> Loading…</div>
      </div>
    </div>

    <!-- My Claims -->
    <div id="panelMyClaims" class="tab-panel">
      <div id="claimsContainer">
        <div class="loading"><div class="spinner"></div> Loading…</div>
      </div>
    </div>

    </div><!-- /mainContent -->

  </main>

  <!-- ===================== CLAIM MODAL ===================== -->
  <div id="claimModal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3>Claim Tickets</h3>
        <button class="modal-close" onclick="closeClaimModal()">✕</button>
      </div>
      <div class="modal-body">
        <p style="font-size:15px;font-weight:600;margin-bottom:16px" id="claimEventTitle"></p>
        <div class="form-group">
          <label>Select Ticket Sets</label>
          <div id="claimSetsContainer" style="display:flex;flex-direction:column;gap:12px;margin-top:8px">
            <!-- Populated by JS -->
          </div>
        </div>
        <div id="claimError" class="error-msg hidden"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeClaimModal()">Cancel</button>
        <button class="btn btn-primary" id="submitClaim">Confirm Claim</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
