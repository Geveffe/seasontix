<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="Wb5U-shOYWXHBWjn487SlxEjlcrbeGvpN2nBSok-vZ8" />
  <title>Season Tix — Sign In</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-card">

      <img src="friends.png" alt="Friends at the game" class="auth-hero-img">

      <div class="auth-header">
        <h1>Season Tix</h1>
        <p class="auth-subtitle">Claim your seats for the season</p>
      </div>

      <!-- LOGIN FORM -->
      <div id="loginForm" class="auth-form">
        <h2>Welcome back</h2>
        <button id="googleLoginBtn" class="btn btn-google btn-full">
          <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.013 17.64 11.705 17.64 9.2z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
            <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          Sign in with Google
        </button>
        <div class="auth-divider">or</div>
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
        </div>
        <div id="loginError" class="error-msg hidden"></div>
        <button id="loginBtn" class="btn btn-primary btn-full">Sign In</button>
        <p class="auth-switch">
          Don't have an account? <a href="#" id="showSignup">Sign up</a>
        </p>
      </div>

      <!-- SIGNUP FORM -->
      <div id="signupForm" class="auth-form hidden">
        <h2>Create account</h2>
        <button id="googleSignupBtn" class="btn btn-google btn-full">
          <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.013 17.64 11.705 17.64 9.2z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
            <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          Sign up with Google
        </button>
        <div class="auth-divider">or</div>
        <div class="form-group">
          <label for="signupName">Your Name</label>
          <input type="text" id="signupName" placeholder="Jane Smith" autocomplete="name">
        </div>
        <div class="form-group">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" placeholder="Min. 8 characters" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="signupConfirm">Confirm Password</label>
          <input type="password" id="signupConfirm" placeholder="••••••••" autocomplete="new-password">
        </div>
        <div id="signupError" class="error-msg hidden"></div>
        <button id="signupBtn" class="btn btn-primary btn-full">Create Account</button>
        <p class="auth-switch">
          Already have an account? <a href="#" id="showLogin">Sign in</a>
        </p>
      </div>

    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
